<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
<title id="title">Repository social preview</title>
<desc id="desc">Social sharing card for the repository</desc>


<defs>
  <radialGradient id="bg" cx="50%" cy="22%" r="80%">
    <stop offset="0%" stop-color="#172554"/>
    <stop offset="56%" stop-color="#0b1222"/>
    <stop offset="100%" stop-color="#020617"/>
  </radialGradient>
  <linearGradient id="beam" x1="0" x2="1">
    <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0"/>
    <stop offset="52%" stop-color="#7dd3fc" stop-opacity="0.95"/>
    <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="routeA" x1="0" x2="1">
    <stop offset="0%" stop-color="#7dd3fc"/>
    <stop offset="50%" stop-color="#f97316"/>
    <stop offset="100%" stop-color="#a3e635"/>
  </linearGradient>
  <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
    <path d="M34 0H0V34" stroke="#38bdf8" stroke-opacity="0.055" stroke-width="1" fill="none"/>
  </pattern>
  <filter id="glow">
    <feGaussianBlur stdDeviation="4"/>
    <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <style>
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
    .sans { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .scan { animation: scan 6s ease-in-out infinite; }
    .dash { stroke-dasharray: 14 18; animation: dash 16s linear infinite; }
    .pulse { animation: pulse 3s ease-in-out infinite; transform-origin:center; }
    .float { animation: float 8s ease-in-out infinite; }
    @keyframes dash { to { stroke-dashoffset: -540; } }
    @keyframes scan { 0%,100% { transform: translateX(-340px); opacity: .08; } 50% { transform: translateX(640px); opacity: .22; } }
    @keyframes pulse { 0%,100% { opacity: .40; } 50% { opacity: 1; } }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  </style>
</defs>

<rect width="1280" height="640" rx="40" fill="url(#bg)"/>
<rect width="1280" height="640" rx="40" fill="url(#grid)"/>
<rect x="1.5" y="1.5" width="1277" height="637" rx="38.5" stroke="#7dd3fc" stroke-opacity=".24"/>
<rect class="scan" x="0" y="0" width="380" height="640" fill="url(#beam)" opacity=".22"/>
<text x="88" y="132" class="mono" fill="#7dd3fc" font-size="22" letter-spacing="3.2">PROFILE SIGNAL KIT</text>
<text x="88" y="240" class="sans" fill="#f8fafc" font-size="74" font-weight="900">Animated GitHub</text>
<text x="88" y="322" class="sans" fill="#f8fafc" font-size="74" font-weight="900">Profile README Template</text>
<text x="88" y="390" class="mono" fill="#d7e2f0" font-size="24">dark SVG banners · repo cards · focus panels · SEO-ready starter repo</text>
<path class="dash" filter="url(#glow)" d="M88 474 C 260 432, 370 562, 568 482 S 888 354, 1108 436" stroke="url(#routeA)" stroke-width="4" fill="none"/>
<g class="pulse" transform="translate(1010 118)">
  <rect width="154" height="154" rx="38" fill="#07111f" stroke="#7dd3fc" stroke-opacity=".46"/>
  <path d="M38 76 h28 l12 -30 l22 68 l14 -34 h30" stroke="#7dd3fc" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
</g>
</svg>
