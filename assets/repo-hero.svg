<svg width="1120" height="360" viewBox="0 0 1120 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
<title id="title">Profile Signal Kit</title>
<desc id="desc">animated github profile readme template · svg system · starter repository</desc>


<defs>
  <radialGradient id="bg" cx="50%" cy="22%" r="80%">
    <stop offset="0%" stop-color="#172554"/>
    <stop offset="56%" stop-color="#081326"/>
    <stop offset="100%" stop-color="#020617"/>
  </radialGradient>
  <linearGradient id="beam" x1="0" x2="1">
    <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0"/>
    <stop offset="52%" stop-color="#7dd3fc" stop-opacity="0.95"/>
    <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="routeA" x1="0" x2="1">
    <stop offset="0%" stop-color="#7dd3fc"/>
    <stop offset="50%" stop-color="#f97316"/>
    <stop offset="100%" stop-color="#a3e635"/>
  </linearGradient>
  <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
    <path d="M34 0H0V34" stroke="#38bdf8" stroke-opacity="0.06" stroke-width="1" fill="none"/>
  </pattern>
  <filter id="glow">
    <feGaussianBlur stdDeviation="4"/>
    <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <style>
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
    .sans { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .scan { animation: scan 6s ease-in-out infinite; }
    .dash { stroke-dasharray: 14 18; animation: dash 16s linear infinite; }
    .pulse { animation: pulse 3s ease-in-out infinite; transform-origin:center; }
    .float { animation: float 8s ease-in-out infinite; }
    @keyframes dash { to { stroke-dashoffset: -540; } }
    @keyframes scan { 0%,100% { transform: translateX(-340px); opacity: .08; } 50% { transform: translateX(640px); opacity: .22; } }
    @keyframes pulse { 0%,100% { opacity: .40; } 50% { opacity: 1; } }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  </style>
</defs>

<rect width="1120" height="360" rx="30" fill="url(#bg)"/>
<rect width="1120" height="360" rx="30" fill="url(#grid)"/>
<rect x="1.2" y="1.2" width="1117.6" height="357.6" rx="28.8" stroke="#7dd3fc" stroke-opacity=".28"/>
<rect class="scan" x="0" y="0" width="340" height="360" fill="url(#beam)" opacity=".22"/>
<path class="dash" filter="url(#glow)" d="M58 264 C 196 236, 298 312, 444 258 S 686 154, 836 208 S 964 230, 1024 190" stroke="url(#routeA)" stroke-width="2.8" fill="none"/>
<g class="float">
  <circle cx="836" cy="206" r="5" fill="#a3e635"/>
  <circle cx="948" cy="236" r="4.5" fill="#7dd3fc"/>
  <circle cx="764" cy="194" r="4.5" fill="#f97316"/>
</g>
<text x="72" y="88" class="mono" fill="#7dd3fc" font-size="15" letter-spacing="2.6">~/starter-kit</text>
<text x="72" y="144" class="sans" fill="#f8fafc" font-size="58" font-weight="900">Profile Signal Kit</text>
<text x="72" y="178" class="mono" fill="#a5b7ce" font-size="22">animated github profile readme template · svg system · starter repository</text>
<text x="72" y="186" class="mono" fill="#eef5ff" font-size="17">Build premium GitHub profile READMEs with animated SVG banners, cards, and panels.</text>
<text x="72" y="220" class="mono" fill="#eef5ff" font-size="17">Template repo included. Practical customization steps included.</text>
<text x="72" y="254" class="mono" fill="#eef5ff" font-size="17">Designed to look intentional in both GitHub light mode and GitHub dark mode.</text>
<g class="pulse" transform="translate(930 86)">
  <rect width="120" height="120" rx="32" fill="#07111f" stroke="#7dd3fc" stroke-opacity=".46"/>
  <circle cx="60" cy="60" r="36" stroke="#a3e635" stroke-opacity=".3"/>
  <path d="M30 60 h18 l9 -22 l16 48 l10 -25 h20" stroke="#7dd3fc" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</g>
<path d="M64 78 h120" stroke="#7dd3fc" stroke-opacity=".36"/>
<path d="M64 78 v18" stroke="#7dd3fc" stroke-opacity=".36"/>
<path d="M966 292 h72" stroke="#5b7aa6" stroke-opacity=".56"/>
<path d="M1038 292 v-42" stroke="#5b7aa6" stroke-opacity=".56"/>
</svg>
