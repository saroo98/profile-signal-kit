<svg width="1120" height="320" viewBox="0 0 1120 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
<title id="title">Personal signal</title>
<desc id="desc">optional visual identity block</desc>


<defs>
  <radialGradient id="bg" cx="50%" cy="22%" r="80%">
    <stop offset="0%" stop-color="#172554"/>
    <stop offset="56%" stop-color="#0b1222"/>
    <stop offset="100%" stop-color="#020617"/>
  </radialGradient>
  <linearGradient id="beam" x1="0" x2="1">
    <stop offset="0%" stop-color="#f97316" stop-opacity="0"/>
    <stop offset="52%" stop-color="#f97316" stop-opacity="0.95"/>
    <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="routeA" x1="0" x2="1">
    <stop offset="0%" stop-color="#f97316"/>
    <stop offset="50%" stop-color="#a78bfa"/>
    <stop offset="100%" stop-color="#a3e635"/>
  </linearGradient>
  <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
    <path d="M34 0H0V34" stroke="#38bdf8" stroke-opacity="0.055" stroke-width="1" fill="none"/>
  </pattern>
  <filter id="glow">
    <feGaussianBlur stdDeviation="4"/>
    <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <style>
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
    .sans { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .scan { animation: scan 6s ease-in-out infinite; }
    .dash { stroke-dasharray: 14 18; animation: dash 16s linear infinite; }
    .pulse { animation: pulse 3s ease-in-out infinite; transform-origin:center; }
    .float { animation: float 8s ease-in-out infinite; }
    @keyframes dash { to { stroke-dashoffset: -540; } }
    @keyframes scan { 0%,100% { transform: translateX(-340px); opacity: .08; } 50% { transform: translateX(640px); opacity: .22; } }
    @keyframes pulse { 0%,100% { opacity: .40; } 50% { opacity: 1; } }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  </style>
</defs>

<rect width="1120" height="320" rx="28" fill="url(#bg)"/>
<rect width="1120" height="320" rx="28" fill="url(#grid)"/>
<rect x="1.2" y="1.2" width="1117.6" height="317.6" rx="26.8" stroke="#f97316" stroke-opacity=".26"/>
<rect class="scan" x="0" y="0" width="260" height="320" fill="url(#beam)" opacity=".18"/>
<path class="dash" filter="url(#glow)" d="M56 238 C 176 184, 314 304, 476 224 S 750 160, 916 232 S 970 290, 1056 210" stroke="url(#routeA)" stroke-width="2.5" fill="none"/>
<text x="78" y="78" class="mono" fill="#f97316" font-size="15" letter-spacing="2.4">SIGNAL</text>
<text x="78" y="124" class="sans" fill="#f8fafc" font-size="42" font-weight="850">Personal signal</text>
<text x="78" y="150" class="mono" fill="#9fb0c7" font-size="18">optional visual identity block</text>
<text x="78" y="174" class="mono" fill="#d7e2f0" font-size="18">Use this panel if you want a mood cue, portrait, or signature note.</text>
<text x="78" y="208" class="mono" fill="#d7e2f0" font-size="18">Keep it small and intentional so it does not overpower your work.</text>
<text x="78" y="242" class="mono" fill="#d7e2f0" font-size="18">For most profiles, personality should support the work, not replace it.</text>
<g class="pulse" transform="translate(908 90)">
  <rect width="120" height="82" rx="24" fill="#091324" stroke="#f97316" stroke-opacity=".46"/>
  <path d="M28 40 h20 l8 -20 l16 42 l10 -22 h24" stroke="#f97316" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</g>
</svg>
