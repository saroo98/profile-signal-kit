<svg width="420" height="320" viewBox="0 0 420 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
<title id="title">Desk loop frame</title>
<desc id="desc">Frame placeholder for a desk setup animation or workflow loop.</desc>


<defs>
  <radialGradient id="bg" cx="50%" cy="22%" r="80%">
    <stop offset="0%" stop-color="#172554"/>
    <stop offset="56%" stop-color="#091324"/>
    <stop offset="100%" stop-color="#020617"/>
  </radialGradient>
  <linearGradient id="beam" x1="0" x2="1">
    <stop offset="0%" stop-color="#f97316" stop-opacity="0"/>
    <stop offset="52%" stop-color="#f97316" stop-opacity="0.95"/>
    <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="routeA" x1="0" x2="1">
    <stop offset="0%" stop-color="#f97316"/>
    <stop offset="50%" stop-color="#f97316"/>
    <stop offset="100%" stop-color="#a3e635"/>
  </linearGradient>
  <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
    <path d="M34 0H0V34" stroke="#38bdf8" stroke-opacity="0.055" stroke-width="1" fill="none"/>
  </pattern>
  <filter id="glow">
    <feGaussianBlur stdDeviation="4"/>
    <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <style>
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
    .sans { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .scan { animation: scan 6s ease-in-out infinite; }
    .dash { stroke-dasharray: 14 18; animation: dash 16s linear infinite; }
    .pulse { animation: pulse 3s ease-in-out infinite; transform-origin:center; }
    .float { animation: float 8s ease-in-out infinite; }
    @keyframes dash { to { stroke-dashoffset: -540; } }
    @keyframes scan { 0%,100% { transform: translateX(-340px); opacity: .08; } 50% { transform: translateX(640px); opacity: .22; } }
    @keyframes pulse { 0%,100% { opacity: .40; } 50% { opacity: 1; } }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  </style>
</defs>

<rect width="420" height="320" rx="26" fill="url(#bg)"/>
<rect width="420" height="320" rx="26" fill="url(#grid)" opacity=".5"/>
<rect x="1" y="1" width="418" height="318" rx="25" stroke="#f97316" stroke-opacity=".28"/>
<rect x="28" y="28" width="364" height="264" rx="18" fill="#0c1526" stroke="#7dd3fc" stroke-opacity=".18"/>
<path class="dash" d="M44 50 H126" stroke="#f97316" stroke-opacity=".5" stroke-width="2"/>
<path class="dash" d="M294 270 H376" stroke="#f97316" stroke-opacity=".5" stroke-width="2"/>
<text x="210.0" y="140.0" text-anchor="middle" class="sans" fill="#eff6ff" font-size="22" font-weight="800">desk gif frame</text>
<text x="210.0" y="176.0" text-anchor="middle" class="mono" fill="#9db0c9" font-size="15">drop your image here</text>
<circle class="pulse" cx="362" cy="58" r="6" fill="#f97316"/>
</svg>
