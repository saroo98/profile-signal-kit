<svg width="1120" height="94" viewBox="0 0 1120 94" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
<title id="title">Badge strip</title>
<desc id="desc">Graphic strip for badges and metadata</desc>


<defs>
  <radialGradient id="bg" cx="50%" cy="22%" r="80%">
    <stop offset="0%" stop-color="#172554"/>
    <stop offset="56%" stop-color="#0b1222"/>
    <stop offset="100%" stop-color="#020617"/>
  </radialGradient>
  <linearGradient id="beam" x1="0" x2="1">
    <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0"/>
    <stop offset="52%" stop-color="#7dd3fc" stop-opacity="0.95"/>
    <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="routeA" x1="0" x2="1">
    <stop offset="0%" stop-color="#7dd3fc"/>
    <stop offset="50%" stop-color="#f97316"/>
    <stop offset="100%" stop-color="#a3e635"/>
  </linearGradient>
  <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
    <path d="M34 0H0V34" stroke="#38bdf8" stroke-opacity="0.055" stroke-width="1" fill="none"/>
  </pattern>
  <filter id="glow">
    <feGaussianBlur stdDeviation="4"/>
    <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <style>
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
    .sans { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .scan { animation: scan 6s ease-in-out infinite; }
    .dash { stroke-dasharray: 14 18; animation: dash 16s linear infinite; }
    .pulse { animation: pulse 3s ease-in-out infinite; transform-origin:center; }
    .float { animation: float 8s ease-in-out infinite; }
    @keyframes dash { to { stroke-dashoffset: -540; } }
    @keyframes scan { 0%,100% { transform: translateX(-340px); opacity: .08; } 50% { transform: translateX(640px); opacity: .22; } }
    @keyframes pulse { 0%,100% { opacity: .40; } 50% { opacity: 1; } }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  </style>
</defs>

<rect width="1120" height="94" rx="22" fill="#020617"/>
<rect width="1120" height="94" rx="22" fill="url(#grid)" opacity=".45"/>
<g transform="translate(46 24)">
  <rect width="154" height="42" rx="10" fill="#3f3f46"/><text x="77" y="27" text-anchor="middle" class="mono" fill="#ffffff" font-size="15">REPOSITORIES</text>
  <rect x="166" width="186" height="42" rx="10" fill="#7dd3fc"/><text x="259" y="27" text-anchor="middle" class="mono" fill="#092032" font-size="15">SELECTED WORK</text>
  <rect x="366" width="134" height="42" rx="10" fill="#52525b"/><text x="433" y="27" text-anchor="middle" class="mono" fill="#ffffff" font-size="15">STARTER KIT</text>
  <rect x="514" width="206" height="42" rx="10" fill="#f97316"/><text x="617" y="27" text-anchor="middle" class="mono" fill="#fff7ed" font-size="15">PROFILE TEMPLATE</text>
  <rect x="734" width="216" height="42" rx="10" fill="#a3e635"/><text x="842" y="27" text-anchor="middle" class="mono" fill="#1e293b" font-size="15">ANIMATED SVG SYSTEM</text>
</g>
</svg>
