<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Profile Signal Kit Preview</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;background:#dbe2ea;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif}
.wrap{max-width:1080px;margin:26px auto;padding:0 18px}
.readme{background:#fff;border:1px solid #d0d7de;border-radius:12px;padding:28px}
h1,h2{line-height:1.2} h2{border-bottom:1px solid #d0d7de;padding-bottom:.35em}
img{max-width:100%;height:auto}
.note{font:13px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:#5d6776;margin:10px 0 20px}
</style>
</head>
<body>
<div class="wrap">
  <div class="note">Local preview only. GitHub rendering is the source of truth; real READMEs should not depend on this CSS.</div>
  <div class="readme">
    <p align="center"><img src="./assets/repo-hero.svg" alt=""></p>
    <p align="center"><img src="./assets/badge-strip.svg" alt=""></p>
    <h1>Profile Signal Kit</h1>
    <p>Animated GitHub Profile README template with dark SVG banners, cards, dividers, and starter files.</p>
    <p align="center"><img src="./assets/divider-calm.svg" alt=""></p>
    <p align="center"><img src="./assets/card-project-template-a.svg" width="49%" alt=""> <img src="./assets/card-project-template-b.svg" width="49%" alt=""></p>
    <p align="center"><img src="./assets/card-project-template-c.svg" width="49%" alt=""> <img src="./assets/card-project-template-d.svg" width="49%" alt=""></p>
    <p align="center"><img src="./assets/panel-current-focus-template.svg" alt=""></p>
    <p align="center"><img src="./assets/panel-working-style-template.svg" alt=""></p>
    <p align="center"><img src="./assets/footer-signal.svg" alt=""></p>
  </div>
</div>
</body>
</html>
